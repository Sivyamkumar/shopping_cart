# shopping-cart.yaml
apiVersion: v1
kind: Pod
metadata:
  name: mongo
  labels:
    app: mongo
spec:
  containers:
    - name: mongo
      image: mongo:6
      ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Pod
metadata:
  name: shopping-cart-app
  labels:
    app: shopping-cart-app
spec:
  containers:
    - name: shopping-cart-app
      image: sivyam/shopping-cart:tagname
      ports:
        - containerPort: 3000
      env:
        - name: MONGO_DB_URL
          value: "mongodb://mongo:27017/shopping-cart"